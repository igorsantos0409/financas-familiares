body{font-family:'Segoe UI',Arial,sans-serif;font-size:10pt;color:#1a1a2e;background:#fff}
.header{background:linear-gradient(135deg,#1a1f2e,#2d3650);color:#fff;padding:22px 28px;border-radius:8px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18pt;font-weight:700}
.header p{font-size:9pt;opacity:.7;margin-top:3px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.kpi{border:1.5px solid #e8ecf5;border-radius:8px;padding:12px 16px}
.kpi-lbl{font-size:7pt;text-transform:uppercase;letter-spacing:.06em;color:#999;margin-bottom:3px}
.kpi-val{font-size:14pt;font-weight:700}
.green{color:#27ae60}.red{color:#c0392b}.amber{color:#e67e22}.blue{color:#2980b9}
h2{font-size:10.5pt;font-weight:700;color:#2d3650;margin:18px 0 8px;padding-bottom:4px;border-bottom:2px solid #4f8ef7}
table{width:100%;border-collapse:collapse;font-size:8.5pt}
th{background:#f0f3ff;color:#444;font-weight:700;padding:6px 9px;text-align:left;border-bottom:1.5px solid #d0d7ee}
td{padding:5px 9px;border-bottom:.5px solid #edf0f7;vertical-align:middle}
tfoot td{font-weight:700;padding:7px 9px;border-top:1.5px solid #d0d7ee;border-bottom:none;background:#f8f9ff}
.footer{margin-top:28px;text-align:center;font-size:7.5pt;color:#bbb;border-top:1px solid #eee;padding-top:10px}
.print-btn{position:fixed;top:14px;right:14px;background:#4f8ef7;color:#fff;border:none;padding:9px 18px;border-radius:7px;font-size:10pt;font-weight:700;cursor:pointer;box-shadow:0 3px 12px rgba(79,142,247,.4);z-index:999}
.obj-bar{height:5px;background:#e8ecf5;border-radius:3px;margin-top:3px;overflow:hidden}
.obj-bar-fill{height:100%;border-radius:3px}
@media print{.print-btn{display:none}body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style></head><body>
<button class="print-btn" onclick="window.print()">🖨️ Guardar como PDF</button>
<div class="header">
  <div><h1>💰 Relatório Financeiro</h1><p>${MESES[mes-1]} ${ano}</p></div>
  <div style="text-align:right;font-size:8pt;opacity:.6">Gerado em ${hoje}</div>
</div>
<div class="kpis">
  <div class="kpi"><div class="kpi-lbl">Rendimento</div><div class="kpi-val green">${totalRend>0?fmt(totalRend):'–'}</div></div>
  <div class="kpi"><div class="kpi-lbl">Total gasto</div><div class="kpi-val amber">${fmt(totalGasto)}</div></div>
  <div class="kpi"><div class="kpi-lbl">Saldo</div><div class="kpi-val ${saldo>=0?'green':'red'}">${totalRend>0?fmt(saldo):'–'}</div></div>
  <div class="kpi"><div class="kpi-lbl">Poupado p/ objetivos</div><div class="kpi-val blue">${totalPoupancasMes>0?fmt(totalPoupancasMes):'–'}</div></div>
</div>
${totalRend>0?`<h2>👥 Rendimentos</h2><table><thead><tr><th>Pessoa</th><th>Tipo</th><th>Nota</th><th style="text-align:right">Valor</th></tr></thead><tbody>${rendRows}</tbody><tfoot><tr><td colspan="3">Total rendimento</td><td style="text-align:right" class="green">${fmt(totalRend)}</td></tr></tfoot></table>`:''}
<h2>📊 Por categoria</h2>
<table><thead><tr><th>Categoria</th><th style="text-align:right">Gasto</th><th style="text-align:right">Orçado</th><th style="text-align:right">%</th></tr></thead><tbody>${catRows}</tbody>
<tfoot><tr><td>Total</td><td style="text-align:right" class="amber">${fmt(totalGasto)}</td><td style="text-align:right;color:#888">${fmt(totalOrcado)}</td><td></td></tr></tfoot></table>
${_allObjetivos.length?`<h2>🎯 Objetivos — progresso acumulado</h2>
<table><thead><tr><th>Objetivo</th><th style="text-align:right">Este mês</th><th style="text-align:right">Total poupado</th><th style="text-align:right">Meta</th><th style="text-align:right">Progresso</th></tr></thead>
<tbody>${objRows}</tbody>
<tfoot><tr><td>Total poupado este mês</td><td style="text-align:right" class="blue">${fmt(totalPoupancasMes)}</td><td colspan="3"></td></tr></tfoot></table>`:''}
${poupancasMes.length?`<h2>💰 Depósitos em objetivos — ${MESES[mes-1]}</h2>
<table><thead><tr><th>Data</th><th>Objetivo</th><th>Descrição</th><th style="text-align:right">Valor</th></tr></thead>
<tbody>${poupMesRows}</tbody>
<tfoot><tr><td colspan="3">Total depositado</td><td style="text-align:right" class="blue">${fmt(totalPoupancasMes)}</td></tr></tfoot></table>`:''}
<h2>📋 Despesas detalhadas</h2>
<table><thead><tr><th>Dia</th><th>Categoria</th><th>Descrição</th><th style="text-align:center">Por</th><th style="text-align:right">Valor</th></tr></thead><tbody>${despRows}</tbody>
<tfoot><tr><td colspan="4">Total despesas</td><td style="text-align:right" class="red">${fmt(totalGasto)}</td></tr></tfoot></table>
<div class="footer">Finanças Familiares · ${MESES[mes-1]} ${ano} · Documento gerado automaticamente</div>
</body></html>`;

  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const w    = window.open(url, '_blank');
  if (!w) showToast('Permite pop-ups para abrir o relatório', 'error');
  else showToast('Relatório aberto — clica "Guardar como PDF" ✓', 'success');
}



// ══════════════════════════════════════════════════════════════════
// PESQUISA DE DESPESAS
// ══════════════════════════════════════════════════════════════════
let _pesquisaDesp = [];
let _pesquisaFiltro = { texto: '', catId: null, minVal: '', maxVal: '', periodo: 'mes' };

async function renderPesquisa() {
  const el = document.getElementById('page-pesquisa');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>A pesquisar…</div>';
  el.classList.add('active');

  const isD = window.innerWidth >= 900;
  const _deskH = isD ? `<div class="desktop-header"><h2>🔍 Pesquisa</h2></div>` : '';

  // Carregar todas as despesas do ano
  if (!_pesquisaDesp.length) {
    const { data } = await sb.from('despesas').select('*').eq('ano', ano).order('mes', {ascending:false}).order('dia', {ascending:false});
    _pesquisaDesp = data || [];
  }

  const catOpts = cats.map(c => `<option value="${c.id}">${c.icone} ${c.nome}</option>`).join('');

  let html = _deskH + `
  <div class="search-bar">
    <span style="color:var(--text3);font-size:1.1rem">🔍</span>
    <input type="text" id="srch-txt" placeholder="Pesquisar por nome, descrição…"
      value="${_pesquisaFiltro.texto}"
      oninput="_pesquisaFiltro.texto=this.value;renderResultados()">
  </div>
  <div class="search-filters">
    <select id="srch-cat" style="background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:.25rem .75rem;font-size:.75rem;color:var(--text3);cursor:pointer"
      onchange="_pesquisaFiltro.catId=this.value?parseInt(this.value):null;renderResultados()">
      <option value="">Todas as categorias</option>${catOpts}
    </select>
    <input type="number" id="srch-min" placeholder="Min €" min="0" step="0.01"
      style="background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:.25rem .75rem;font-size:.75rem;color:var(--text);width:80px"
      value="${_pesquisaFiltro.minVal}"
      oninput="_pesquisaFiltro.minVal=this.value;renderResultados()">
    <input type="number" id="srch-max" placeholder="Max €" min="0" step="0.01"
      style="background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:.25rem .75rem;font-size:.75rem;color:var(--text);width:80px"
      value="${_pesquisaFiltro.maxVal}"
      oninput="_pesquisaFiltro.maxVal=this.value;renderResultados()">
    <span class="filter-chip ${_pesquisaFiltro.periodo==='mes'?'active':''}" onclick="_pesquisaFiltro.periodo='mes';_pesquisaDesp=[];renderPesquisa()">Este mês</span>
    <span class="filter-chip ${_pesquisaFiltro.periodo==='ano'?'active':''}" onclick="_pesquisaFiltro.periodo='ano';_pesquisaDesp=[];renderPesquisa()">Este ano</span>
    <span class="filter-chip ${_pesquisaFiltro.periodo==='tudo'?'active':''}" onclick="_pesquisaFiltro.periodo='tudo';_pesquisaDesp=[];renderPesquisa()">Tudo</span>
  </div>
  <div id="srch-results"></div>`;

  el.innerHTML = html;
  el.classList.add('active');

  // Reload based on period
  let query = sb.from('despesas').select('*');
  if (_pesquisaFiltro.periodo === 'mes') query = query.eq('ano', ano).eq('mes', mes);
  else if (_pesquisaFiltro.periodo === 'ano') query = query.eq('ano', ano);
  query = query.order('mes', {ascending:false}).order('dia', {ascending:false});
  const { data } = await query;
  _pesquisaDesp = data || [];
  renderResultados();
}

function renderResultados() {
  const el = document.getElementById('srch-results');
  if (!el) return;
  let desp = [..._pesquisaDesp];

  const txt = _pesquisaFiltro.texto.toLowerCase().trim();
  if (txt) desp = desp.filter(d =>
    d.subcategoria?.toLowerCase().includes(txt) ||
    d.descricao?.toLowerCase().includes(txt)
  );
  if (_pesquisaFiltro.catId) desp = desp.filter(d => d.categoria_id === _pesquisaFiltro.catId);
  if (_pesquisaFiltro.minVal) desp = desp.filter(d => parseFloat(d.valor) >= parseFloat(_pesquisaFiltro.minVal));
  if (_pesquisaFiltro.maxVal) desp = desp.filter(d => parseFloat(d.valor) <= parseFloat(_pesquisaFiltro.maxVal));

  const total = desp.reduce((s,d) => s+parseFloat(d.valor), 0);

  if (!desp.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>Sem resultados para os filtros aplicados.</div>`;
    return;
  }

  el.innerHTML = `<div class="search-result-count">${desp.length} resultado${desp.length!==1?'s':''} · total ${fmt(total)}</div>` +
    desp.map(d => {
      const cat = cats.find(c=>c.id===d.categoria_id);
      const mesStr = `${d.dia||'?'}/${d.mes}/${d.ano}`;
      return `<div class="di">
        <div class="di-ico">${cat?.icone||'💰'}</div>
        <div class="di-info">
          <div class="di-name">${d.subcategoria}</div>
          <div class="di-meta">${cat?.nome||'–'} · ${mesStr}${d.descricao?' · '+d.descricao:''}</div>
        </div>
        <div class="di-right"><div class="di-val">${fmt(d.valor)}</div></div>
        <button class="desp-edit" onclick="openEdit('${d.id}')" title="Editar">✏️</button>
        <button class="desp-edit" onclick="openFotoInput('${d.id}')" title="Foto recibo">📷</button>
        ${d.foto_url?`<div class="foto-wrap" style="display:inline-block;margin-left:.25rem"><img src="${d.foto_url}" class="foto-thumb" onclick="window.open('${d.foto_url}','_blank')" title="Ver foto"><button class="foto-del" onclick="delFoto('${d.id}','${d.foto_url}')">×</button></div>`:''}
        <button class="di-del" onclick="delDSearch('${d.id}')">🗑</button>
      </div>`;
    }).join('');
}

async function delDSearch(id) {
  if (!confirm('Apagar esta despesa?')) return;
  await sb.from('despesas').delete().eq('id', id);
  _pesquisaDesp = _pesquisaDesp.filter(d => d.id !== id);
  renderResultados();
  showToast('Apagado ✓', 'success');
}

// ══════════════════════════════════════════════════════════════════
// NOTAS MENSAIS + OBJETIVO DO MÊS (guardados no Supabase - tabela notas)
// ══════════════════════════════════════════════════════════════════
let _notaTimer = null;

async function loadNota() {
  try {
    const { data } = await sb.from('notas_mensais').select('*')
      .eq('ano', ano).eq('mes', mes).single();
    return data;
  } catch(e) { return null; }
}

async function saveNota(texto, objMes, objMesValor) {
  const existing = await loadNota();
  const payload = { user_id: user.id, ano, mes, nota: texto, obj_mes: objMes, obj_mes_valor: objMesValor || null };
  if (existing) {
    await sb.from('notas_mensais').update(payload).eq('id', existing.id);
  } else {
    await sb.from('notas_mensais').insert(payload);
  }
}

function autoSaveNota() {
  clearTimeout(_notaTimer);
  _notaTimer = setTimeout(async () => {
    const txt = document.getElementById('nota-texto')?.value || '';
    const obj = document.getElementById('nota-obj')?.value || '';
    const val = document.getElementById('nota-obj-val')?.value || '';
    await saveNota(txt, obj, val);
    const lbl = document.getElementById('nota-saved-lbl');
    if (lbl) { lbl.style.opacity = '1'; setTimeout(() => lbl.style.opacity = '0', 2000); }
  }, 1000);
}

// ══════════════════════════════════════════════════════════════════
// FOTO DE RECIBO
// ══════════════════════════════════════════════════════════════════
let _fotoTargetId = null;

function openFotoInput(despId) {
  _fotoTargetId = despId;
  document.getElementById('foto-input').click();
}

async function uploadFoto(event) {
  const file = event.target.files[0];
  if (!file || !_fotoTargetId) return;
  if (file.size > 5 * 1024 * 1024) { showToast('Foto demasiado grande (máx 5MB)', 'error'); return; }

  showToast('A enviar foto…', 'success');
  const ext  = file.name.split('.').pop();
  const path = `recibos/${user.id}/${_fotoTargetId}.${ext}`;

  try {
    const { error: upErr } = await sb.storage.from('recibos').upload(path, file, { upsert: true });
    if (upErr) throw upErr;
    const { data: urlData } = sb.storage.from('recibos').getPublicUrl(path);
    await sb.from('despesas').update({ foto_url: urlData.publicUrl }).eq('id', _fotoTargetId);
    showToast('Foto guardada ✓', 'success');
    renderDesp();
  } catch(e) {
    showToast('Erro ao guardar foto. Cria o bucket "recibos" no Supabase Storage.', 'error');
  }
  event.target.value = '';
}

async function delFoto(despId, fotoUrl) {
  if (!confirm('Apagar esta foto?')) return;
  await sb.from('despesas').update({ foto_url: null }).eq('id', despId);
  showToast('Foto apagada ✓', 'success');
  renderDesp();
}


function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  setTimeout(()=>t.className='toast',2800);
}

init();
</script>
