<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Finanças Familiares</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1f2e;--surface2:#232a3d;--surface3:#2d3650;
  --border:#2e3650;--border2:#3d4a6b;
  --accent:#4f8ef7;--accent2:#6aa3ff;
  --green:#2ecc71;--red:#e74c3c;--amber:#f39c12;--purple:#8b5cf6;--gold:#f59e0b;
  --text:#e8eaf0;--text2:#9aa5be;--text3:#6b7a99;
  --radius:12px;--radius-sm:8px;--shadow:0 4px 24px rgba(0,0,0,0.4);
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;overflow-x:hidden}
button{cursor:pointer;font-family:inherit}input,select,textarea{font-family:inherit}
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f1117,#1a2040);padding:1rem}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:380px;box-shadow:var(--shadow)}
.auth-logo{text-align:center;margin-bottom:2rem}
.auth-logo .icon{font-size:3rem;margin-bottom:.5rem}
.auth-logo h1{font-size:1.4rem;font-weight:700}
.auth-logo p{font-size:.8rem;color:var(--text3);margin-top:.3rem}
.auth-err{background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.3);border-radius:var(--radius-sm);padding:.75rem 1rem;margin-bottom:1rem;font-size:.85rem;color:#ff6b6b;display:none}
.fg{margin-bottom:1.2rem}
.fg label{display:block;font-size:.8rem;font-weight:500;color:var(--text2);margin-bottom:.4rem}
.fg input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem 1rem;color:var(--text);font-size:.95rem;transition:border-color .2s}
.fg input:focus{outline:none;border-color:var(--accent)}
.btn-primary{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:.85rem;font-size:.95rem;font-weight:600;transition:all .2s}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.6;transform:none;cursor:not-allowed}
#app{display:none;height:100vh;flex-direction:column}
#app.visible{display:flex}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:.75rem}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;color:#fff;flex-shrink:0}
.topbar-info .tname{font-size:.9rem;font-weight:600}
.topbar-info .tdate{font-size:.72rem;color:var(--text3)}
.topbar-right{display:flex;gap:.4rem;align-items:center}
.month-nav{display:flex;align-items:center;gap:.4rem}
.month-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:var(--radius-sm);width:30px;height:30px;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .15s}
.month-btn:hover{border-color:var(--accent);color:var(--accent)}
.month-lbl{font-size:.82rem;font-weight:600;min-width:80px;text-align:center}
.btn-ico{background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:var(--radius-sm);width:34px;height:34px;font-size:1rem;display:flex;align-items:center;justify-content:center}
.main{flex:1;overflow-y:auto;padding:1rem;padding-bottom:140px}
@media(min-width:640px){.main{max-width:700px;margin:0 auto}}
@media(min-width:900px){
  #app{flex-direction:row}
  .topbar{display:none}
  .bottom-nav{position:fixed;top:0;left:0;bottom:0;right:auto;width:200px;flex-direction:column;border-top:none;border-right:1px solid var(--border);padding:1.5rem 0;gap:.25rem;z-index:100}
  .nav-item{flex-direction:row;justify-content:flex-start;gap:.75rem;padding:.65rem 1.25rem;border-radius:var(--radius-sm);margin:0 .5rem;font-size:.85rem;width:auto}
  .nav-icon{font-size:1.1rem}
  .nav-item.active{background:rgba(79,142,247,.12)}
  .main{margin-left:200px;max-width:none;padding:1.5rem 2rem;padding-bottom:2rem}
  .fab{bottom:1.5rem;right:1.5rem}
  .desktop-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
  .desktop-header h2{font-size:1.2rem;font-weight:700}
  .desktop-header-right{display:flex;align-items:center;gap:.75rem}
  .month-nav-desktop{display:flex;align-items:center;gap:.5rem}
  .month-btn-d{background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:var(--radius-sm);width:32px;height:32px;font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
  .month-btn-d:hover{border-color:var(--accent);color:var(--accent)}
  .month-lbl-d{font-size:.9rem;font-weight:600;min-width:100px;text-align:center}
  .avatar-d{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;color:#fff;cursor:pointer}
  .g2{grid-template-columns:repeat(3,1fr)}
  .card.full{grid-column:1/-1}
  .cat-list{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
}
@media(min-width:1200px){
  .main{padding:2rem 3rem;padding-bottom:2rem}
  .g2{grid-template-columns:repeat(4,1fr)}
}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:.55rem 0;gap:.15rem;background:none;border:none;color:var(--text3);font-size:.62rem;font-weight:500;transition:color .15s}
.nav-icon{font-size:1.2rem}
.nav-item.active{color:var(--accent)}
.page{display:none}.page.active{display:block}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
.card.full{grid-column:1/-1}
.card.c-green{border-color:rgba(46,204,113,.3);background:rgba(46,204,113,.05)}
.card.c-red{border-color:rgba(231,76,60,.3);background:rgba(231,76,60,.05)}
.card.c-amber{border-color:rgba(243,156,18,.3);background:rgba(243,156,18,.05)}
.card.c-purple{border-color:rgba(139,92,246,.3);background:rgba(139,92,246,.05)}
.clbl{font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem}
.cval{font-size:1.35rem;font-weight:700}
.cval.g{color:var(--green)}.cval.r{color:var(--red)}.cval.a{color:var(--amber)}.cval.p{color:var(--purple)}
.csub{font-size:.7rem;color:var(--text3);margin-top:.2rem}
.cbar{height:4px;background:var(--surface3);border-radius:2px;margin-top:.6rem;overflow:hidden}
.cbar-f{height:100%;border-radius:2px;transition:width .5s}
.stitle{font-size:.72rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:1.2rem 0 .6rem}
.cat-list{display:flex;flex-direction:column;gap:.45rem}
.cat-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.8rem 1rem;display:flex;align-items:center;gap:.75rem}
.cat-icon{font-size:1.3rem;flex-shrink:0}
.cat-info{flex:1;min-width:0}
.cat-name{font-size:.88rem;font-weight:500}
.cat-prog{margin-top:.25rem;display:flex;align-items:center;gap:.4rem}
.cat-bar{flex:1;height:3px;background:var(--surface3);border-radius:2px;overflow:hidden}
.cat-bar-f{height:100%;border-radius:2px}
.cat-pct{font-size:.68rem;color:var(--text3);min-width:30px;text-align:right}
.cat-amts{text-align:right;flex-shrink:0}
.cat-real{font-size:.92rem;font-weight:600}
.cat-orc{font-size:.7rem;color:var(--text3)}
.di{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.8rem 1rem;display:flex;align-items:center;gap:.75rem;margin-bottom:.45rem}
.di-ico{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;background:var(--surface2)}
.di-info{flex:1;min-width:0}
.di-name{font-size:.88rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.di-meta{font-size:.7rem;color:var(--text3);margin-top:.1rem}
.di-right{text-align:right;flex-shrink:0}
.di-val{font-size:.95rem;font-weight:600;color:var(--red)}
.di-del{background:none;border:none;color:var(--text3);font-size:.9rem;padding:.2rem .35rem;border-radius:4px;transition:color .15s;margin-left:.2rem}
.di-del:hover{color:var(--red)}
.rsec{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.75rem;overflow:hidden}
.rsec-hdr{padding:.8rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.rsec-title{font-size:.9rem;font-weight:600}
.badge{background:var(--surface2);border:1px solid var(--border2);border-radius:99px;padding:.15rem .6rem;font-size:.78rem;font-weight:600;color:var(--accent)}
.ritems{padding:.4rem .5rem}
.ri{display:flex;align-items:center;gap:.75rem;padding:.55rem .5rem;border-bottom:1px solid var(--border)}
.ri:last-child{border-bottom:none}
.ri-info{flex:1}
.ri-tipo{font-size:.82rem;font-weight:500;display:flex;align-items:center;gap:.3rem;flex-wrap:wrap}
.ri-nota{font-size:.7rem;color:var(--text3);margin-top:.1rem}
.ri-val{font-size:.92rem;font-weight:600;color:var(--green)}
.ri-del{background:none;border:none;color:var(--text3);font-size:.85rem;padding:.2rem .35rem;border-radius:4px;transition:color .15s}
.ri-del:hover{color:var(--red)}
.btn-add{display:flex;align-items:center;justify-content:center;gap:.4rem;background:none;border:1px dashed var(--border2);color:var(--text3);border-radius:var(--radius-sm);padding:.5rem;font-size:.8rem;transition:all .15s;width:100%;margin:.4rem 0}
.btn-add:hover{border-color:var(--accent);color:var(--accent)}
.tag{border-radius:4px;font-size:.62rem;padding:.1rem .35rem;font-weight:600}
.t-baixa{background:rgba(231,76,60,.15);color:var(--red)}
.t-com{background:rgba(243,156,18,.15);color:var(--amber)}
.t-sub{background:rgba(46,204,113,.15);color:var(--green)}
.t-ext{background:rgba(139,92,246,.15);color:var(--purple)}
.rdim{opacity:.55;font-style:italic}
.diz-box{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.25);border-radius:var(--radius);padding:.85rem 1rem;margin-bottom:.75rem}
.diz-lbl{font-size:.7rem;color:var(--gold);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.2rem}
.diz-val{font-size:1.1rem;font-weight:700;color:var(--gold)}
.diz-sub{font-size:.7rem;color:var(--text3);margin-top:.1rem}
.rsum{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:.75rem}
.rsum-row{display:flex;justify-content:space-between;align-items:center;padding:.3rem 0;border-bottom:1px solid var(--border)}
.rsum-row:last-child{border-bottom:none;padding-top:.55rem}
.rsum-lbl{font-size:.82rem;color:var(--text2)}
.rsum-val{font-size:.9rem;font-weight:600}
.rsum-tot{font-size:1.05rem;font-weight:700;color:var(--green)}
.dica{border-radius:var(--radius);padding:1rem;margin-bottom:.75rem;border-left:4px solid}
.dica.verde{background:rgba(46,204,113,.08);border-color:var(--green)}
.dica.vermelho{background:rgba(231,76,60,.08);border-color:var(--red)}
.dica.amber{background:rgba(243,156,18,.08);border-color:var(--amber)}
.dica.roxo{background:rgba(139,92,246,.08);border-color:var(--purple)}
.dica.azul{background:rgba(79,142,247,.08);border-color:var(--accent)}
.dica-hdr{display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem}
.dica-titulo{font-size:.88rem;font-weight:600}
.dica-texto{font-size:.82rem;color:var(--text2);line-height:1.55}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:.75rem}
.chart-title{font-size:.82rem;font-weight:600;color:var(--text2);margin-bottom:.75rem}
.chart-wrap{position:relative;height:200px}
.fab{position:fixed;bottom:70px;right:1rem;background:var(--accent);color:#fff;border:none;border-radius:50%;width:52px;height:52px;font-size:1.5rem;box-shadow:0 4px 16px rgba(79,142,247,.4);display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:99}
.fab:hover{transform:scale(1.08);background:var(--accent2)}
@media(min-width:640px){.fab{right:calc(50% - 350px)}}
@media(min-width:900px){.fab{right:2rem;bottom:2rem}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
@media(min-width:640px){.overlay{align-items:center}}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:1.5rem;max-height:90vh;overflow-y:auto}
@media(min-width:640px){.modal{border-radius:20px;margin-bottom:1rem}}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 1.2rem}
.modal-title{font-size:1.1rem;font-weight:700;margin-bottom:1.2rem}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.mf{display:flex;flex-direction:column;gap:.3rem}
.mf.full{grid-column:1/-1}
.mf label{font-size:.75rem;color:var(--text2);font-weight:500}
.mf input,.mf select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.65rem .85rem;color:var(--text);font-size:.9rem;transition:border-color .2s}
.mf input:focus,.mf select:focus{outline:none;border-color:var(--accent)}
.mf select option{background:var(--surface2)}
.mactions{display:flex;gap:.75rem;margin-top:1.2rem}
.btn-cancel{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:var(--radius-sm);padding:.75rem;font-size:.9rem;font-weight:500}
.btn-save{flex:2;background:var(--accent);border:none;color:#fff;border-radius:var(--radius-sm);padding:.75rem;font-size:.9rem;font-weight:600;transition:all .2s}
.btn-save:hover{background:var(--accent2)}
.btn-save:disabled{opacity:.6;cursor:not-allowed}
.loading{display:flex;align-items:center;justify-content:center;padding:2rem;color:var(--text3);font-size:.9rem;gap:.5rem}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:2rem;color:var(--text3);font-size:.9rem}
.empty-icon{font-size:2.5rem;margin-bottom:.5rem}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:.65rem 1.2rem;font-size:.85rem;font-weight:500;z-index:500;opacity:0;transition:all .3s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(46,204,113,.5);color:var(--green)}
.toast.error{border-color:rgba(231,76,60,.5);color:var(--red)}
.info-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;font-size:.82rem;color:var(--text2);line-height:1.8;margin-bottom:.75rem}
.obj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem;margin-bottom:.75rem;position:relative;overflow:hidden}
.obj-card.principal{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.04)}
.obj-emoji{font-size:2rem;margin-bottom:.5rem}
.obj-title{font-size:1rem;font-weight:700;margin-bottom:.15rem}
.obj-meta{font-size:.75rem;color:var(--text3);margin-bottom:1rem}
.obj-bar-wrap{margin-bottom:.75rem}
.obj-bar-track{height:10px;background:var(--surface3);border-radius:5px;overflow:hidden;margin:.4rem 0}
.obj-bar-fill{height:100%;border-radius:5px;transition:width .6s ease;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.obj-bar-fill.gold{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.obj-bar-fill.green{background:linear-gradient(90deg,#10b981,#34d399)}
.obj-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-bottom:.75rem}
.obj-stat{background:var(--surface2);border-radius:var(--radius-sm);padding:.6rem .75rem;text-align:center}
.obj-stat-lbl{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.2rem}
.obj-stat-val{font-size:.95rem;font-weight:700}
.obj-stat-val.accent{color:var(--accent)}
.obj-stat-val.gold{color:var(--gold)}
.obj-stat-val.green{color:var(--green)}
.obj-cenario{background:var(--surface2);border-radius:var(--radius-sm);padding:.75rem;margin-bottom:.5rem}
.obj-cenario-title{font-size:.75rem;font-weight:600;color:var(--text2);margin-bottom:.4rem}
.obj-cenario-row{display:flex;justify-content:space-between;font-size:.75rem;color:var(--text3);padding:.15rem 0}
.obj-cenario-val{color:var(--text);font-weight:500}
.obj-cenario.custom{border:1px solid rgba(139,92,246,.35);background:rgba(139,92,246,.06)}
.obj-cenario.custom .obj-cenario-title{color:var(--purple)}
.custom-slider-wrap{margin:.5rem 0 .25rem}
.custom-slider{-webkit-appearance:none;width:100%;height:4px;background:var(--border);border-radius:2px;outline:none}
.custom-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:var(--purple);border-radius:50%;cursor:pointer}
.custom-slider-labels{display:flex;justify-content:space-between;font-size:.65rem;color:var(--text3);margin-top:.2rem}
.custom-subsidios-row{display:flex;align-items:center;gap:.5rem;margin:.4rem 0;font-size:.75rem;color:var(--text3)}
.custom-subsidios-row input[type=checkbox]{accent-color:var(--purple);width:14px;height:14px}
.obj-input-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem}
.obj-input-row label{font-size:.75rem;color:var(--text2);min-width:120px}
.obj-input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.45rem .7rem;color:var(--text);font-size:.85rem;width:100%;transition:border-color .2s}
.obj-input:focus{outline:none;border-color:var(--accent)}
.btn-obj{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:.55rem 1rem;font-size:.82rem;font-weight:600;transition:all .2s;cursor:pointer}
.btn-obj:hover{background:var(--accent2)}
.btn-obj.secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-obj.secondary:hover{border-color:var(--border2)}
.obj-contrib-list{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.75rem;max-height:200px;overflow-y:auto}
.obj-contrib-item{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border-radius:var(--radius-sm);padding:.5rem .75rem;font-size:.8rem}
.obj-contrib-left{display:flex;align-items:center;gap:.5rem}
.obj-contrib-tipo{font-size:.68rem;color:var(--text3)}
.obj-contrib-val{font-weight:600;color:var(--green)}
.obj-contrib-del{background:none;border:none;color:var(--text3);font-size:.85rem;cursor:pointer;padding:.1rem .3rem;border-radius:3px}
.obj-contrib-del:hover{color:var(--red)}
.milestone{display:flex;align-items:center;gap:.5rem;font-size:.78rem;color:var(--text3);padding:.3rem 0}
.milestone.done{color:var(--green)}
.milestone-dot{width:10px;height:10px;border-radius:50%;background:var(--border2);flex-shrink:0}
.milestone.done .milestone-dot{background:var(--green)}
.milestone.active .milestone-dot{background:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.25)}
.milestone.active{color:var(--text)}
@media(min-width:900px){.obj-stats{grid-template-columns:repeat(4,1fr)}.obj-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}}

<script>
// ── CONFIG ─── substituir com os teus valores do Supabase ─────────────────
const SUPABASE_URL      = 'https://omcgauxnqxsqhwkmwdib.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tY2dhdXhucXhzcWh3a213ZGliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjQ3MjAsImV4cCI6MjA5MTQwMDcyMH0.iKrCFEvap-3JUTnoBNnc-Ny803_CRaeMRvSCwAzJGN0';
// ─────────────────────────────────────────────────────────────────────────
// NOTA DE SEGURANÇA:
// Orçamento, salários e dados financeiros estão APENAS no Supabase,
// protegidos por Row Level Security. O HTML não contém nenhum valor.
// ─────────────────────────────────────────────────────────────────────────

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let user=null, mes=new Date().getMonth()+1, ano=new Date().getFullYear();
let cats=[], orcamento=[], rends=[], charts={};

const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
             'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

const fmt = v => new Intl.NumberFormat('pt-PT',{style:'currency',currency:'EUR'}).format(v||0);
const pctC = p => p>=100?'var(--red)':p>=80?'var(--amber)':'var(--green)';
const getCatNome  = id => cats.find(c=>c.id===id)?.nome  ||'–';
const getCatIcone = id => cats.find(c=>c.id===id)?.icone ||'💰';
const totalRends  = () => rends.reduce((s,r)=>s+parseFloat(r.valor),0);
const totalOrc    = () => orcamento.reduce((s,o)=>s+parseFloat(o.valor_orcado),0);

function tipoTag(t) {
  if(!t) return '';
  if(t.includes('baixa'))    return '<span class="tag t-baixa">baixa</span>';
  if(t.includes('omiss'))    return '<span class="tag t-com">comissão</span>';
  if(t.includes('Subsídio')) return '<span class="tag t-sub">subsídio</span>';
  if(t.includes('extra'))    return '<span class="tag t-ext">extra</span>';
  return '';
}

// ── AUTH ──────────────────────────────────────────────────────────────────
let _booted = false;

async function init() {
  // Registar listener PRIMEIRO para capturar INITIAL_SESSION
  sb.auth.onAuthStateChange((event, s) => {
    if (s && !_booted) {
      _booted = true;
      user = s.user;
      boot();
    } else if (!s && event === 'SIGNED_OUT') {
      _booted = false;
      user = null;
      document.getElementById('app').classList.remove('visible');
      document.getElementById('auth-screen').style.display = 'flex';
    }
  });
}

async function doLogin() {
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  const btn=document.getElementById('l-btn');
  const err=document.getElementById('auth-err');
  err.style.display='none';
  if(!email||!pass){showErr('Preenche email e password.');return;}
  btn.disabled=true;btn.textContent='A entrar…';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){showErr('Email ou password incorretos.');btn.disabled=false;btn.textContent='Entrar';}
  else{user=data.user;await boot();}
}

async function doLogout(){
  await sb.auth.signOut();user=null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('auth-screen').style.display='flex';
}

function showErr(m){const e=document.getElementById('auth-err');e.textContent=m;e.style.display='block';}
document.getElementById('l-pass').addEventListener('keypress',e=>{if(e.key==='Enter')doLogin();});

// ── BOOTSTRAP ─────────────────────────────────────────────────────────────
async function boot(){
  try {
    const nome=user.email.split('@')[0];
    // Carregar dados ANTES de mostrar a app
    const _t = new Promise((_,rej) => setTimeout(()=>rej('timeout'),8000));
    try { await Promise.race([Promise.all([loadCats(),loadOrc(),loadR()]),_t]); }
    catch(te){ console.warn('Load timeout:',te); }
    // Só agora mostrar a app
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('u-av').textContent=nome[0].toUpperCase();
    document.getElementById('u-nm').textContent=nome.charAt(0).toUpperCase()+nome.slice(1);
    document.getElementById('u-dt').textContent=new Date().toLocaleDateString('pt-PT',{weekday:'short',day:'numeric',month:'short'});
    updateM();
    setupDesktop();
    nav('dashboard');
  } catch(e) {
    console.error('Boot error:', e);
    // Se falhar, volta ao login
    user = null;
    document.getElementById('app').classList.remove('visible');
    document.getElementById('auth-screen').style.display='flex';
    showErr('Erro ao carregar. Tenta fazer login novamente.');
  }
}

function setupDesktop() {
  const isDesktop = window.innerWidth >= 900;
  const logo   = document.getElementById('nav-logo');
  const logout = document.getElementById('nav-logout');
  const topbar = document.querySelector('.topbar');
  if (logo)   logo.style.display   = isDesktop ? 'block' : 'none';
  if (logout) logout.style.display = isDesktop ? 'flex'  : 'none';
  if (topbar) topbar.style.display = isDesktop ? 'none'  : 'flex';
  const nome = user?.email?.split('@')[0] || '';
  const nu = document.getElementById('nav-username');
  const nd = document.getElementById('nav-date-d');
  if (nu) nu.textContent = nome.charAt(0).toUpperCase()+nome.slice(1);
  if (nd) nd.textContent = new Date().toLocaleDateString('pt-PT',{weekday:'short',day:'numeric',month:'short'});
}

window.addEventListener('resize', () => { if(user) setupDesktop(); });

function updateM(){
  document.getElementById('m-lbl').textContent=`${MESES[mes-1].slice(0,3)} ${ano}`;
  const dl=document.getElementById('mlbl-d');
  if(dl) dl.textContent=`${MESES[mes-1]} ${ano}`;
}

async function changeMonth(d){
  mes+=d;if(mes>12){mes=1;ano++;}if(mes<1){mes=12;ano--;}
  updateM();
  await Promise.all([loadOrc(),loadR()]);
  const p=document.querySelector('.nav-item.active')?.dataset?.p||'dashboard';
  renderPage(p);
}

function nav(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  const pageEl = document.getElementById(`page-${p}`);
  const navEl  = document.querySelector(`[data-p="${p}"]`);
  if(pageEl) pageEl.classList.add('active');
  if(navEl)  navEl.classList.add('active');
  document.getElementById('fab').style.display=(p==='despesas'||p==='dashboard')?'flex':'none';
  // Re-add active after async render completes
  const result = renderPage(p);
  if(result && result.then) result.then(()=>{
    if(pageEl) pageEl.classList.add('active');
    if(navEl)  navEl.classList.add('active');
  });
}

function renderPage(p){
  if(p==='dashboard')   return renderDash();
  if(p==='despesas')    return renderDesp();
  if(p==='rendimentos') return renderRend();
  if(p==='graficos')    return renderGraf();
  if(p==='dicas')       return renderDicas();
  if(p==='objetivos')   return renderObjetivos();
  if(p==='config')      return renderConfig();
}

// ── DADOS ─────────────────────────────────────────────────────────────────
async function loadCats(){
  try {
    const{data,error}=await sb.from('categorias').select('*').order('ordem');
    if(error){console.error('loadCats error:',error);return;}
    if(data){
      cats=data;
      const sel=document.getElementById('d-cat');
      if(sel) sel.innerHTML=cats.map(c=>`<option value="${c.id}">${c.icone} ${c.nome}</option>`).join('');
    }
  } catch(e){console.error('loadCats catch:',e);}
}

async function loadOrc(){
  // O orçamento é carregado do Supabase — nenhum valor está no HTML
  const{data}=await sb.from('orcamento').select('*').eq('ano',ano).eq('mes',mes);
  orcamento=data||[];
  // Se não existe orçamento para este mês, tenta o mais recente como base
  if(!orcamento.length){
    const{data:prev}=await sb.from('orcamento').select('*').order('ano',{ascending:false}).order('mes',{ascending:false}).limit(50);
    // Agrupar por categoria_id+subcategoria e usar o valor mais recente
    const seen=new Set();
    (prev||[]).forEach(o=>{
      const k=`${o.categoria_id}|${o.subcategoria}`;
      if(!seen.has(k)){seen.add(k);orcamento.push({...o,ano,mes});}
    });
  }
}

async function loadR(){
  try {
    const{data,error}=await sb.from('rendimentos').select('*').eq('ano',ano).eq('mes',mes).order('created_at');
    if(error){console.error('loadR error:',error);rends=[];return;}
    rends=data||[];
  } catch(e){console.error('loadR catch:',e);rends=[];}
}

async function getDesp(){
  try {
    const{data,error}=await sb.from('despesas').select('*').eq('ano',ano).eq('mes',mes).order('dia',{ascending:false});
    if(error){console.error('getDesp error:',error);return[];}
    return data||[];
  } catch(e){console.error('getDesp catch:',e);return[];}
}

      <div class="clbl">Projeção mês</div>

// ── DICAS ─────────────────────────────────────────────────────────────────
async function renderDicas(){
  const el=document.getElementById('page-dicas');
  el.innerHTML='<div class="loading"><div class="spinner"></div>A calcular…</div>';
  if(!cats.length) await loadCats();
  if(!orcamento.length) await loadOrc();
  const desp=await getDesp();
  const _deskH=window.innerWidth>=900?`<div class="desktop-header"><h2>Dicas Financeiras</h2><div class="desktop-header-right"><div class="month-nav-desktop"><button class="month-btn-d" onclick="changeMonth(-1)">‹</button><span class="month-lbl-d" id="mlbl-d">${MESES[mes-1]} ${ano}</span><button class="month-btn-d" onclick="changeMonth(1)">›</button></div><button style="background:none;border:1px solid var(--border);color:var(--text3);border-radius:var(--radius-sm);padding:.3rem .7rem;font-size:.8rem;cursor:pointer" onclick="doLogout()">Sair</button></div></div>`:'';
  const tR=totalRends(),tO=totalOrc();
  const tG=desp.reduce((s,d)=>s+parseFloat(d.valor),0);
  const saldo=tR-tG;
  const diasM=new Date(ano,mes,0).getDate();
  const diaA=(ano===new Date().getFullYear()&&mes===new Date().getMonth()+1)?new Date().getDate():diasM;
  const proj=diaA>0?(tG/diaA)*diasM:0;
  const porCat={},orcCat={};
  desp.forEach(d=>{const n=getCatNome(d.categoria_id);porCat[n]=(porCat[n]||0)+parseFloat(d.valor);});
  orcamento.forEach(o=>{const n=getCatNome(o.categoria_id);orcCat[n]=(orcCat[n]||0)+parseFloat(o.valor_orcado);});
  const igor=rends.filter(r=>r.nome_pessoa==='igor');
  const tIgor=igor.reduce((s,r)=>s+parseFloat(r.valor),0);
  let ds=[];
  if(tR===0){
    ds.push({t:'amber',i:'⚠️',ti:'Rendimentos não introduzidos',tx:`Vai ao separador Rendimentos para introduzir os salários de ${MESES[mes-1]}. Sem isso não é possível calcular o saldo real nem as dicas financeiras.`});
  } else {
    if(saldo>=0) ds.push({t:'verde',i:'✅',ti:'Orçamento equilibrado',tx:`Têm ${fmt(saldo)} de saldo este mês. ${saldo>500?'Excelente — considerem reforçar as poupanças.':'Dentro do esperado.'}`});
    else ds.push({t:'vermelho',i:'🔴',ti:'A exceder o orçamento',tx:`Estão ${fmt(Math.abs(saldo))} acima do rendimento. Revejam as categorias com maior desvio e adiem gastos não essenciais.`});
    if(proj>tO*1.05) ds.push({t:'amber',i:'📈',ti:'Projeção acima do orçado',tx:`Ao ritmo atual irão gastar ${fmt(proj)} em ${MESES[mes-1]}, ${fmt(proj-tO)} acima do orçado.`});
    ds.push({t:'azul',i:'💡',ti:'Regra dos 50/30/20',tx:`Com ${fmt(tR)} de rendimento: Necessidades (50%) = ${fmt(tR*.5)} · Desejos (30%) = ${fmt(tR*.3)} · Poupança (20%) = ${fmt(tR*.2)}.`});
    ds.push({t:'roxo',i:'🏦',ti:'Fundo de emergência',tx:`O ideal é ter 3 a 6 meses de despesas em reserva: entre ${fmt(tO*3)} e ${fmt(tO*6)}. Vão lá chegar progressivamente com o cofrinho mensal.`});
    if(tIgor>0) ds.push({t:'amber',i:'🙏',ti:`Dízimo: ${fmt(tIgor*.1)}`,tx:`10% do rendimento real do Igor este mês (${fmt(tIgor)}). Calculado automaticamente a partir do que introduziste em Rendimentos.`});
  }
  (cats||[]).forEach(cat=>{
    const g=porCat[cat.nome]||0,o=orcCat[cat.nome]||0;
    if(o>0&&g>o) ds.push({t:'vermelho',i:cat.icone,ti:`${cat.nome} acima do orçado`,tx:`Gastaram ${fmt(g)}, ${fmt(g-o)} acima dos ${fmt(o)} orçados.`});
  });

let _sugestoes = []; // cache de descrições já usadas

async function loadSugestoes() {
  const { data } = await sb.from('despesas')
    .select('subcategoria, categoria_id')
    .order('created_at', { ascending: false });
  if (!data) return;
  // Deduplicate mantendo a mais recente de cada descrição
  const seen = new Set();
  _sugestoes = [];
  data.forEach(d => {
    const key = d.subcategoria.toLowerCase();
    if (!seen.has(key)) {
      seen.add(key);
      _sugestoes.push({ nome: d.subcategoria, cat_id: d.categoria_id });
    }
  });
}

function filterSugestoes(val) {
  const list = document.getElementById('ac-list');
  if (!list) return;
  const q = val.trim().toLowerCase();
  const matches = q.length === 0
    ? _sugestoes.slice(0, 8)
    : _sugestoes.filter(s => s.nome.toLowerCase().includes(q)).slice(0, 8);
  if (!matches.length) { list.classList.remove('open'); return; }
  list.innerHTML = matches.map(s => {
    const catNome = getCatNome(s.cat_id);
    return `<div class="autocomplete-item" onmousedown="pickSugestao('${s.nome.replace(/'/g,"\'")}', ${s.cat_id})">
      <span class="autocomplete-item-name">${s.nome}</span>
      <span class="autocomplete-item-cat">${catNome}</span>
    </div>`;
  }).join('');
  list.classList.add('open');
}

function pickSugestao(nome, catId) {
  document.getElementById('d-desc').value = nome;
  // Auto-select the category
  const sel = document.getElementById('d-cat');
  if (sel && catId) {
    for (let i = 0; i < sel.options.length; i++) {
      if (parseInt(sel.options[i].value) === catId) { sel.selectedIndex = i; break; }
    }
  }
  closeAC();
}

function closeAC() {
  const list = document.getElementById('ac-list');
  if (list) list.classList.remove('open');
}

function openD(){
  document.getElementById('d-dia').value=new Date().getDate();
  ['d-val','d-desc','d-nota'].forEach(id=>document.getElementById(id).value='');
  closeAC();
  loadSugestoes();

}

function updateCustomCenario() {
  const slider    = document.getElementById('custom-slider');
  const subSlider = document.getElementById('custom-sub-slider');
  const lbl       = document.getElementById('custom-val-lbl');
  const subLbl    = document.getElementById('custom-sub-lbl');
  const result    = document.getElementById('custom-result');
  if (!slider || !lbl || !result) return;

  const mensal    = parseInt(slider.value);
  const subsidios = subSlider ? parseInt(subSlider.value) : 0;
  lbl.textContent    = `${mensal} €/mês`;
  if (subLbl) subLbl.textContent = fmt(subsidios).replace(' €','') + ' €';

  // Get current falta from the page
  const faltaEl = document.querySelector('.obj-bar-track + div');
  // Recalculate from poupancas (use global if available)
  const totalAnual = mensal * 12 + subsidios;
  const mesesParaMeta = _objFalta > 0 ? Math.ceil(_objFalta / (totalAnual / 12)) : 0;
  const dataChegada = new Date();
  dataChegada.setMonth(dataChegada.getMonth() + mesesParaMeta);
  const antesAlvo = dataChegada <= OBJETIVO_CASAMENTO.dataAlvo;
  const cor = antesAlvo ? 'var(--green)' : 'var(--amber)';

  result.innerHTML = `
    <div class="obj-cenario-row"><span>Total por ano</span><span class="obj-cenario-val">${fmt(totalAnual)}</span></div>
    ${subsidios > 0 ? `<div class="obj-cenario-row"><span>+ Subsídios incluídos</span><span class="obj-cenario-val">${fmt(subsidios)}</span></div>` : ''}
    <div class="obj-cenario-row"><span>Chegam ao objetivo em</span>
      <span class="obj-cenario-val" style="color:${cor};font-weight:700">
        ${dataChegada.toLocaleDateString('pt-PT',{month:'long',year:'numeric'})} ${antesAlvo?'✓':'⚠'}
      </span>
    </div>
    <div class="obj-cenario-row"><span>Meses necessários</span><span class="obj-cenario-val">${mesesParaMeta}</span></div>`;
}

// Global para o cenário custom ter acesso ao valor falta
let _objFalta = 0;

async function saveContrib(objId) {
  const tipo  = document.getElementById('ob-tipo')?.value || 'mensal';
  const val   = parseFloat(document.getElementById('ob-val')?.value);
  const nota  = document.getElementById('ob-nota')?.value.trim();
  if (!val || val <= 0) { showToast('Introduz um valor válido', 'error'); return; }
  const btn = document.querySelector('.btn-obj');
  if (btn) { btn.disabled = true; }
  const tipoLabel = { mensal:'Poupança mensal', subsidio_ferias:'Subsídio de férias',
    subsidio_natal:'Subsídio de Natal', comissao:'Comissões', extra:'Extra' }[tipo] || tipo;
  const { error } = await sb.from('poupancas').insert({
    user_id: user.id, ano, mes, descricao: nota || tipoLabel,
    valor: val, tipo: 'entrada', objetivo_id: objId || null
  });
  if (btn) { btn.disabled = false; }
  if (error) { showToast('Erro: ' + error.message, 'error'); return; }
  showToast('Depósito registado! ✓', 'success');
  if (document.getElementById('ob-val')) document.getElementById('ob-val').value = '';
  if (document.getElementById('ob-nota')) document.getElementById('ob-nota').value = '';
  renderObjetivos();
}

async function delContrib(id) {
  if (!confirm('Apagar esta contribuição?')) return;
  await sb.from('poupancas').delete().eq('id', id);
  showToast('Apagado ✓', 'success');
  renderObjetivos();
}

async function saveOrcItem(id) {
  const input = document.getElementById('orc-' + id);
  const val = parseFloat(input.value);
  if (isNaN(val) || val < 0) { showToast('Valor inválido', 'error'); return; }
  const { error } = await sb.from('orcamento').update({ valor_orcado: val }).eq('id', id);
  if (error) { showToast('Erro: ' + error.message, 'error'); return; }
  await loadOrc();
  showToast('Guardado ✓', 'success');
  input.style.borderColor = 'var(--green)';
  setTimeout(() => input.style.borderColor = '', 1500);
}

async function delOrcItem(id) {
  if (!confirm('Apagar esta linha do orçamento?')) return;
  await sb.from('orcamento').delete().eq('id', id);
  await loadOrc();
  showToast('Apagado', 'success');
  renderConfig();
}

async function addOrcItem(catId) {
  const sub = document.getElementById('new-sub-' + catId)?.value.trim();
  const val = parseFloat(document.getElementById('new-val-' + catId)?.value);
  if (!sub) { showToast('Escreve o nome da subcategoria', 'error'); return; }
  if (isNaN(val) || val < 0) { showToast('Valor inválido', 'error'); return; }
  const { error } = await sb.from('orcamento').insert({
    user_id: user.id, ano, mes, categoria_id: catId, subcategoria: sub, valor_orcado: val
  });
  if (error) { showToast('Erro: ' + error.message, 'error'); return; }
  await loadOrc();
  showToast('Adicionado ✓', 'success');
  renderConfig();
}

// ══════════════════════════════════════════════════════════════
// OBJETIVOS MÚLTIPLOS
// ══════════════════════════════════════════════════════════════
let _allObjetivos = [];
let _activeObjId = null; // objetivo selecionado para ver detalhes

async function loadObjetivos() {
  try {
    const { data, error } = await sb.from('objetivos').select('*').eq('ativo', true).order('created_at');
    if (error) { _allObjetivos = []; return; }
    _allObjetivos = data || [];
    if (!_allObjetivos.length) await criarObjetivoCasamento();
  } catch(e) { _allObjetivos = []; }
}

async function criarObjetivoCasamento() {
  const { data } = await sb.from('objetivos').insert({
    user_id: user.id, nome: 'Casamento', emoji: '💍',
    meta: 25000, cor: 'gold',
    data_alvo: '2028-06-01', ativo: true
  }).select();
  if (data) _allObjetivos = data;
}

async function loadContribuicoesObj(objId) {
  try {
    const { data, error } = await sb.from('poupancas')
      .select('*').eq('tipo', 'entrada')
      .eq('objetivo_id', objId)
      .order('created_at', { ascending: false });
    if (error) return [];
    return data || [];
  } catch(e) { return []; }
}

async function loadContribuicoes() {
  // backwards compat — load for first objetivo (casamento)
  if (!_allObjetivos.length) await loadObjetivos();
  const obj = _allObjetivos[0];
  if (!obj) return [];
  return loadContribuicoesObj(obj.id);
}

const COR_MAP = {
  gold:   { bg: 'rgba(245,158,11,.08)', border: 'rgba(245,158,11,.35)', text: 'var(--gold)',   bar: 'gold' },
  accent: { bg: 'rgba(79,142,247,.08)', border: 'rgba(79,142,247,.35)', text: 'var(--accent)', bar: '' },
  green:  { bg: 'rgba(46,204,113,.08)', border: 'rgba(46,204,113,.35)', text: 'var(--green)',  bar: 'green' },
  purple: { bg: 'rgba(139,92,246,.08)', border: 'rgba(139,92,246,.35)', text: 'var(--purple)', bar: '' },
  red:    { bg: 'rgba(231,76,60,.08)',  border: 'rgba(231,76,60,.35)',  text: 'var(--red)',    bar: '' },
};

async function renderObjetivos() {
  const el = document.getElementById('page-objetivos');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>A carregar…</div>';
  const isD = window.innerWidth >= 900;
  const _deskH = isD ? `<div class="desktop-header"><h2>🎯 Objetivos</h2><div class="desktop-header-right"><div class="month-nav-desktop"><button class="month-btn-d" onclick="changeMonth(-1)">‹</button><span class="month-lbl-d">${MESES[mes-1]} ${ano}</span><button class="month-btn-d" onclick="changeMonth(1)">›</button></div></div></div>` : '';

  await loadObjetivos();

  if (!_allObjetivos.length) {
    el.innerHTML = _deskH + `<div class="warn-box" style="margin-top:1rem">
      ⚠️ <strong>Tabela de objetivos não encontrada.</strong><br>
      Corre o ficheiro <strong>1.sql</strong> no Supabase SQL Editor para criar a tabela de objetivos.
      Depois recarrega a página.
    </div>`;
    return;
  }

  // Load contributions for all objetivos
  const contribsMap = {};
  await Promise.all(_allObjetivos.map(async o => {
    const cs = await loadContribuicoesObj(o.id);
    contribsMap[o.id] = cs || [];
  }));

  // Tabs
  const tabsHtml = _allObjetivos.map((o,i) => {
    const total = (contribsMap[o.id]||[]).reduce((s,c) => s+parseFloat(c.valor), 0);
    const pct   = Math.min((total/o.meta)*100,100);
    return `<div class="obj-tab ${i===0?'active':''}" id="tab-${o.id}" onclick="switchObjTab('${o.id}')">${o.emoji} ${o.nome} ${Math.round(pct)}%</div>`;
  }).join('');

  // Active objetivo (first by default)
  if (!_activeObjId || !_allObjetivos.find(o=>o.id===_activeObjId)) {
    _activeObjId = _allObjetivos[0]?.id;
  }

  let html = _deskH;
  html += `<div class="obj-tabs" id="obj-tabs">${tabsHtml}<div class="obj-tab" onclick="showCreateObj()" style="border-style:dashed">+ Novo</div></div>`;
  html += `<div id="obj-detail"></div>`;

  // Create form (hidden by default)
  html += `<div id="obj-create-wrap" style="display:none">
    <div class="obj-create-card">
      <div class="obj-create-title">✨ Novo objetivo</div>
      <div class="obj-create-grid">
        <div class="obj-create-field"><label>Emoji</label>
          <input type="text" id="oc-emoji" maxlength="2" placeholder="🎯" value="🎯"></div>
        <div class="obj-create-field"><label>Cor</label>
          <select id="oc-cor">
            <option value="accent">🔵 Azul</option>
            <option value="gold">🟡 Dourado</option>
            <option value="green">🟢 Verde</option>
            <option value="purple">🟣 Roxo</option>
            <option value="red">🔴 Vermelho</option>
          </select></div>
        <div class="obj-create-field full"><label>Nome</label>
          <input type="text" id="oc-nome" placeholder="ex: Férias, Carro novo…"></div>
        <div class="obj-create-field"><label>Meta (€)</label>
          <input type="number" id="oc-meta" min="1" step="100" placeholder="5000"></div>
        <div class="obj-create-field"><label>Data alvo (opcional)</label>
          <input type="date" id="oc-data"></div>
      </div>
      <div style="display:flex;gap:.75rem">
        <button class="btn-cancel" onclick="hideCreateObj()" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.65rem;font-size:.85rem;color:var(--text2);cursor:pointer">Cancelar</button>
        <button class="btn-save" onclick="criarObj()" style="flex:2">✨ Criar objetivo</button>
      </div>
    </div>
  </div>`;

  el.innerHTML = html;

  // Render active objetivo detail
  if (_activeObjId) renderObjDetail(_activeObjId, contribsMap);
}

function switchObjTab(id) {
  _activeObjId = id;
  document.querySelectorAll('.obj-tab').forEach(t => t.classList.remove('active'));
  const tab = document.getElementById('tab-' + id);
  if (tab) tab.classList.add('active');
  // Reload detail
  loadObjetivos().then(async () => {
    const contribsMap = {};
    await Promise.all(_allObjetivos.map(async o => {
      contribsMap[o.id] = await loadContribuicoesObj(o.id);
    }));
    renderObjDetail(id, contribsMap);
  });
}

function showCreateObj() {
  document.getElementById('obj-create-wrap').style.display = 'block';
  document.getElementById('obj-detail').style.display = 'none';
}
function hideCreateObj() {
  document.getElementById('obj-create-wrap').style.display = 'none';
  document.getElementById('obj-detail').style.display = 'block';
}

async function criarObj() {
  const nome   = document.getElementById('oc-nome').value.trim();
  const emoji  = document.getElementById('oc-emoji').value.trim() || '🎯';
  const meta   = parseFloat(document.getElementById('oc-meta').value);
  const cor    = document.getElementById('oc-cor').value;
  const data_a = document.getElementById('oc-data').value || null;
  if (!nome) { showToast('Dá um nome ao objetivo', 'error'); return; }
  if (!meta || meta <= 0) { showToast('Define uma meta válida', 'error'); return; }
  const { error } = await sb.from('objetivos').insert({
    user_id: user.id, nome, emoji, meta, cor, data_alvo: data_a, ativo: true
  });
  if (error) { showToast('Erro: ' + error.message, 'error'); return; }
  showToast('Objetivo criado! ✓', 'success');
  renderObjetivos();
}

async function apagarObj(id) {
  if (!confirm('Apagar este objetivo e todas as contribuições?')) return;
  await sb.from('poupancas').delete().eq('objetivo_id', id);
  await sb.from('objetivos').delete().eq('id', id);
  _activeObjId = null;
  showToast('Objetivo apagado', 'success');
  renderObjetivos();
}

function renderObjDetail(objId, contribsMap) {
  const obj     = _allObjetivos.find(o => o.id === objId);
  const contribs = contribsMap[objId] || [];
  const detail   = document.getElementById('obj-detail');
  if (!obj || !detail) return;

  const total  = contribs.reduce((s,c) => s+parseFloat(c.valor), 0);
  const meta   = parseFloat(obj.meta);
  const falta  = Math.max(0, meta - total);
  const pct    = Math.min((total/meta)*100, 100);
  const cores  = COR_MAP[obj.cor] || COR_MAP.accent;
  _objFalta    = falta;

  const hoje   = new Date();
  const dataA  = obj.data_alvo ? new Date(obj.data_alvo) : null;
  const mesesR = dataA ? Math.max(0, (dataA.getFullYear()-hoje.getFullYear())*12+(dataA.getMonth()-hoje.getMonth())) : null;
  const precisa = (mesesR && falta > 0) ? falta/mesesR : 0;

  const milestones = [
    { val: meta*0.1,  label: `Primeiros 10% 🎉` },
    { val: meta*0.25, label: `25% concluído` },
    { val: meta*0.5,  label: `Metade do caminho 🥂` },
    { val: meta*0.75, label: `75% — quase lá!` },
    { val: meta,      label: `${obj.emoji} Objetivo alcançado!` },
  ];

  let html = `<div style="background:${cores.bg};border:1px solid ${cores.border};border-radius:var(--radius);padding:1.2rem;margin-bottom:.75rem">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
      <div>
        <div style="font-size:1.8rem;margin-bottom:.2rem">${obj.emoji}</div>
        <div style="font-size:1rem;font-weight:700">${obj.nome}</div>
        <div style="font-size:.72rem;color:var(--text3)">Meta: ${fmt(meta)}${dataA?` · Alvo: ${dataA.toLocaleDateString('pt-PT',{month:'long',year:'numeric'})}`:''}</div>
      </div>
      <button class="btn-cfg-del" onclick="apagarObj('${obj.id}')" style="font-size:1.1rem" title="Apagar objetivo">🗑</button>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--text3);margin-bottom:.3rem">
      <span>${fmt(total)} poupados</span><span>${Math.round(pct)}%</span>
    </div>
    <div class="obj-bar-track"><div class="obj-bar-fill ${obj.cor==='gold'?'gold':obj.cor==='green'?'green':''}" style="width:${pct}%;background:${!obj.cor||obj.cor==='accent'?'var(--accent)':obj.cor==='purple'?'var(--purple)':obj.cor==='red'?'var(--red)':''}"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:.7rem;color:var(--text3);margin-top:.25rem">
      <span>Faltam ${fmt(falta)}</span>
      ${precisa>0?`<span>~${fmt(precisa)}/mês necessários</span>`:''}
    </div>
  </div>`;

  // Stats
  html += `<div class="obj-stats" style="margin-bottom:.75rem">
    <div class="obj-stat"><div class="obj-stat-lbl">Poupado</div><div class="obj-stat-val" style="color:${cores.text}">${fmt(total)}</div></div>
    <div class="obj-stat"><div class="obj-stat-lbl">Falta</div><div class="obj-stat-val accent">${fmt(falta)}</div></div>
    <div class="obj-stat"><div class="obj-stat-lbl">${mesesR!==null?'Meses':'Depósitos'}</div><div class="obj-stat-val">${mesesR!==null?mesesR:contribs.length}</div></div>
  </div>`;

  // Milestones
  html += `<div class="obj-card" style="margin-bottom:.75rem">
    <div style="font-size:.82rem;font-weight:600;color:var(--text2);margin-bottom:.6rem">📍 Marcos</div>`;
  milestones.forEach(m => {
    const done   = total >= m.val;
    const active = !done && total >= m.val*0.7;
    html += `<div class="milestone ${done?'done':active?'active':''}">
      <div class="milestone-dot"></div>
      <span>${m.label}</span>
      <span style="margin-left:auto;font-size:.72rem">${fmt(m.val)}</span>
    </div>`;
  });
  html += `</div>`;

  // Cenários (só se tiver data alvo)
  if (dataA) {
    html += `<div class="obj-card" style="margin-bottom:.75rem">
      <div style="font-size:.82rem;font-weight:600;color:var(--text2);margin-bottom:.75rem">📊 Cenários para atingir a meta</div>`;
    CENARIOS.forEach(c => {
      const totalAno = c.mensal*12 + c.subsidios;
      const meses2   = falta>0 ? Math.ceil(falta/(totalAno/12)) : 0;
      const chegada  = new Date(); chegada.setMonth(chegada.getMonth()+meses2);
      const antes    = chegada <= dataA;
      html += `<div class="obj-cenario">
        <div class="obj-cenario-title" style="color:${c.cor}">${c.label}</div>
        <div class="obj-cenario-row"><span>Poupança mensal</span><span class="obj-cenario-val">${fmt(c.mensal)}/mês</span></div>
        ${c.subsidios>0?`<div class="obj-cenario-row"><span>+ Subsídios/ano</span><span class="obj-cenario-val">${fmt(c.subsidios)}</span></div>`:''}
        <div class="obj-cenario-row"><span>Chegam em</span><span class="obj-cenario-val" style="color:${antes?'var(--green)':'var(--amber)'}">${chegada.toLocaleDateString('pt-PT',{month:'long',year:'numeric'})} ${antes?'✓':'⚠'}</span></div>
      </div>`;
    });

    // Custom slider
    html += `<div class="obj-cenario custom" id="cenario-custom">
      <div class="obj-cenario-title">✏️ Personalizado</div>
      <div class="custom-slider-wrap">
        <div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:.3rem">
          <span style="color:var(--text3)">Poupança mensal</span>
          <span style="color:var(--purple);font-weight:700" id="custom-val-lbl">300 €/mês</span>
        </div>
        <input type="range" class="custom-slider" id="custom-slider" min="100" max="1000" step="25" value="300" oninput="updateCustomCenario()">
        <div class="custom-slider-labels"><span>100 €</span><span>550 €</span><span>1.000 €</span></div>
      </div>
      <div style="margin:.5rem 0">
        <div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:.3rem">
          <span style="color:var(--text3)">Subsídios anuais</span>
          <span style="color:var(--purple);font-weight:700" id="custom-sub-lbl">0 €</span>
        </div>
        <input type="range" class="custom-slider" id="custom-sub-slider" min="0" max="10000" step="100" value="0" oninput="updateCustomCenario()">
        <div class="custom-slider-labels"><span>0 €</span><span>5.000 €</span><span>10.000 €</span></div>
        <div style="font-size:.68rem;color:var(--text3);margin-top:.3rem">💡 Ajusta com base nos subsídios que esperas receber.</div>
      </div>
      <div id="custom-result"></div>
    </div>`;
    html += `</div>`;
    setTimeout(updateCustomCenario, 50);
  }

  // Registar depósito
  html += `<div class="obj-card" style="margin-bottom:.75rem">
    <div style="font-size:.82rem;font-weight:600;color:var(--text2);margin-bottom:.75rem">➕ Registar depósito</div>
    <div class="obj-input-row"><label>Tipo</label>
      <select id="ob-tipo" class="obj-input">
        <option value="mensal">Poupança mensal</option>
        <option value="subsidio_ferias">Subsídio de férias</option>
        <option value="subsidio_natal">Subsídio de Natal</option>
        <option value="comissao">Comissões</option>
        <option value="extra">Extra / oferta</option>
      </select></div>
    <div class="obj-input-row"><label>Valor (€)</label>
      <input type="number" id="ob-val" class="obj-input" min="0" step="10" placeholder="0,00"></div>
    <div class="obj-input-row"><label>Nota (opcional)</label>
      <input type="text" id="ob-nota" class="obj-input" placeholder="ex: subsídio junho…"></div>
    <button class="btn-obj" onclick="saveContrib('${obj.id}')" style="width:100%;margin-top:.25rem">${obj.emoji} Adicionar a ${obj.nome}</button>
  </div>`;

  // Histórico
  if (contribs.length) {
    html += `<div class="obj-card" style="margin-bottom:.75rem">
      <div style="font-size:.82rem;font-weight:600;color:var(--text2);margin-bottom:.75rem">📋 Histórico</div>
      <div class="obj-contrib-list">`;
    contribs.slice(0,20).forEach(c => {
      const data = new Date(c.created_at).toLocaleDateString('pt-PT',{day:'numeric',month:'short',year:'numeric'});
      html += `<div class="obj-contrib-item">
        <div class="obj-contrib-left"><div>
          <div>${c.descricao||c.tipo||'Depósito'}</div>
          <div class="obj-contrib-tipo">${data}</div>
        </div></div>
        <div style="display:flex;align-items:center;gap:.5rem">
          <span class="obj-contrib-val">+${fmt(c.valor)}</span>
          ${c.user_id===user?.id?`<button class="obj-contrib-del" onclick="delContrib('${c.id}')">🗑</button>`:''}
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  html += `<div style="height:1rem"></div>`;
  detail.innerHTML = html;
}



function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  setTimeout(()=>t.className='toast',2800);
}

init();
</script>
